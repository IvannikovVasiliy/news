<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" th:href="@{/styleBlog.css}">
</head>
<body>
    <header th:insert="blocks/header :: header"></header>

    <h1>Регистрация</h1>
    <form th:action="@{/registration}" method="post" th:object="${regModel}">
        <label>E-mail</label><input type="email" th:field="*{email}" />
        <label>Имя пользователя: </label><input type="text" th:field="*{login}" />
        <label>Пароль: </label><input type="password" th:field="*{password}"/>
        <label>Имя: </label><input type="text" th:field="*{name}">
        <label>Фамилия: </label><input type="text" th:field="*{surname}">

        <button type="submit">Зарегистрироваться</button>
    </form>

    <div th:insert="blocks/footer :: footer" />
</body>
</html>
